networks:
  sanbing-network:
    driver: bridge
    name: sanbing-network
    ipam:
      config:
        - subnet: 10.10.0.0/24

services:
  jcpp-node-0:
    restart: always
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    networks:
      - sanbing-network
    ports:
      - "8080:8080"
      - "38001:38001"
    environment:
      HTTP_BIND_PORT: 8080